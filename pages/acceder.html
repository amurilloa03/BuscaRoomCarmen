<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f2027">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <title>Acceder — buscaRoom</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/acceder.css">
</head>
<body class="login-page">

  <div class="login-orb-1"></div>
  <div class="login-orb-2"></div>

  <div class="login-particle" style="left:20%;top:10%;animation-delay:0s;animation-duration:5s;"></div>
  <div class="login-particle" style="left:35%;top:22%;animation-delay:0.8s;animation-duration:5.8s;"></div>
  <div class="login-particle" style="left:50%;top:34%;animation-delay:1.6s;animation-duration:6.6s;"></div>
  <div class="login-particle" style="left:65%;top:46%;animation-delay:2.4s;animation-duration:7.4s;"></div>
  <div class="login-particle" style="left:80%;top:58%;animation-delay:3.2s;animation-duration:8.2s;"></div>
  <div class="login-particle" style="left:15%;top:70%;animation-delay:4s;animation-duration:9s;"></div>

  <div class="login-card-wrapper">
    <div class="login-card">

      <div class="login-card-header">
        <div class="login-mosaic">
          <div class="login-mosaic-img">
            <img src="https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=400&q=80" alt="Habitación moderna">
          </div>
          <div class="login-mosaic-img">
            <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=400&q=80" alt="Compañeros">
          </div>
          <div class="login-mosaic-img">
            <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=400&q=80" alt="Espacio compartido">
          </div>
        </div>
        <div class="login-header-overlay"></div>
        <div class="login-header-logo">
          <div class="login-logo-icon">bR</div>
          <div class="login-logo-text">
            <h2>BuscaRoom</h2>
            <p>Encuentra tu espacio ideal</p>
          </div>
        </div>
      </div>

      <div class="login-body">
        <div class="login-title-group">
          <p class="login-heading">Inicia sesión para continuar</p>
          <p class="login-subheading">Accede a tu cuenta con Google o Gmail</p>
        </div>

        <div class="login-space">
          <button class="google-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continuar con Google</span>
          </button>

          <div class="login-divider">
            <div class="login-divider-line"></div>
            <span class="login-divider-text">o usa tu email</span>
            <div class="login-divider-line"></div>
          </div>

          <form style="display:flex;flex-direction:column;gap:1rem;">
            <div class="form-group-dark">
              <label class="input-label">Correo electrónico</label>
              <input class="input-dark" type="email" placeholder="tu@email.com" autocomplete="email">
            </div>
            <div class="form-group-dark">
              <label class="input-label">Contraseña</label>
              <div class="input-wrapper">
                <input class="input-dark" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:3rem;">
                <button class="toggle-pwd-btn" type="button">
                  <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            <button class="submit-gradient-btn" type="button" onclick="window.location.href='panel.html'">Iniciar sesión</button>
            <button class="toggle-form-btn" type="button">¿No tienes cuenta? Regístrate</button>
          </form>
        </div>
      </div>

      <div class="login-footer-text">
        Al iniciar sesión aceptas la
        <a href="#">Política de Privacidad</a> y los
        <a href="#">Términos del Servicio</a>.
      </div>
    </div>

    <div class="back-home-wrap">
      <a href="../index.html" class="back-home">
        <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Volver al inicio
      </a>
    </div>
  </div>

<script>
  // Password visibility toggle
  const pwdInput = document.querySelector('input[type="password"]');
  const togglePwdBtn = document.querySelector('.toggle-pwd-btn');
  if (pwdInput && togglePwdBtn) {
    togglePwdBtn.addEventListener('click', () => {
      pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    });
  }

  // Google button → panel
  document.querySelector('.google-btn').addEventListener('click', () => {
    window.location.href = 'panel.html';
  });

  // Toggle login / registro
  const toggleFormBtn = document.querySelector('.toggle-form-btn');
  const heading = document.querySelector('.login-heading');
  const subheading = document.querySelector('.login-subheading');
  const submitBtn = document.querySelector('.submit-gradient-btn');
  let isRegister = false;

  toggleFormBtn.addEventListener('click', () => {
    isRegister = !isRegister;
    heading.textContent = isRegister ? 'Crea tu cuenta gratis' : 'Inicia sesión para continuar';
    subheading.textContent = isRegister ? 'Únete a buscaRoom en menos de un minuto' : 'Accede a tu cuenta con Google o Gmail';
    submitBtn.textContent = isRegister ? 'Crear cuenta' : 'Iniciar sesión';
    toggleFormBtn.textContent = isRegister ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate';
  });
</script>
<script src="../js/shared.js"></script>
</body>
</html>
