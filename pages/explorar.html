// ─── Estado ────────────────────────────────────────────────────
let currentIndex = 0;
let isAnimating = false;

const stack = document.getElementById('swipeStack');
const profilesLeftEl = document.getElementById('profilesLeft');
const btnSkip = document.getElementById('btnSkip');
const btnLike = document.getElementById('btnLike');
const btnProfile = document.getElementById('btnProfile');

// ─── Tarjetas ──────────────────────────────────────────────────
function createCardHTML(profile, isFront) {
  return `
    <div class="swipe-card ${isFront ? 'swipe-card-front' : 'swipe-card-back'}">
      <img src="${profile.img}" alt="${profile.name}" loading="lazy">
      <div class="swipe-card-overlay"></div>
      <div class="swipe-card-info">
        <div class="swipe-card-name">${profile.name}, ${profile.age}</div>
        <div class="swipe-card-city">${profile.city}${profile.dist ? ' · ' + profile.dist : ''}</div>
        ${isFront ? `
        <div class="swipe-score">
          <svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          ${profile.score}% ${i18n[currentLang].compatible}
        </div>
        <div class="swipe-tags">
          ${profile.tags.map(t => `<span class="swipe-tag">${t}</span>`).join('')}
        </div>` : ''}
      </div>
    </div>
  `;
}

function setButtonsDisabled(disabled) {
  btnSkip.disabled = disabled;
  btnLike.disabled = disabled;
  btnProfile.disabled = disabled;
}

function renderCards() {
  stack.innerHTML = '';

  if (currentIndex >= profiles.length) {
    const t = i18n[currentLang];
    stack.innerHTML = `
      <div class="no-more-cards">
        <svg class="icon icon-xl" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="1.5">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <p>${t.noMore}</p>
        <button class="btn btn-teal" onclick="resetProfiles()">${t.viewAgain}</button>
      </div>
    `;
    setButtonsDisabled(true);
    return;
  }

  setButtonsDisabled(false);

  if (currentIndex + 1 < profiles.length) {
    stack.insertAdjacentHTML('beforeend', createCardHTML(profiles[currentIndex + 1], false));
  }
  stack.insertAdjacentHTML('beforeend', createCardHTML(profiles[currentIndex], true));
  profilesLeftEl.textContent = profiles.length - currentIndex;

  const frontCard = stack.querySelector('.swipe-card-front');
  if (frontCard) {
    frontCard.addEventListener('click', () => {
      if (!isAnimating) openModal(currentIndex);
    });
  }
}

// ─── Swipe ─────────────────────────────────────────────────────
function swipe(direction) {
  if (isAnimating) return;
  const frontCard = stack.querySelector('.swipe-card-front');
  if (!frontCard) return;

  isAnimating = true;
  const tx = direction === 'right' ? '200%' : '-200%';
  const rot = direction === 'right' ? '20deg' : '-20deg';
  frontCard.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
  frontCard.style.transform = `translateX(${tx}) rotate(${rot})`;
  frontCard.style.opacity = '0';

  setTimeout(() => {
    currentIndex++;
    renderCards();
    isAnimating = false;
  }, 400);
}

function resetProfiles() {
  currentIndex = 0;
  renderCards();
}

// ─── Modal ─────────────────────────────────────────────────────

    ${p.score}% ${t.compatible}
  `;
  document.getElementById('modalName').textContent = `${p.name}, ${p.age}`;
  document.getElementById('modalLocation').textContent = `${p.city}${p.dist ? ' · ' + p.dist : ''}`;
  document.getElementById('modalTagsRow').innerHTML = p.tags.map(tag => `<span class="modal-tag">${tag}</span>`).join('');
  document.getElementById('modalBioText').textContent = p.bio;
  document.getElementById('modalInfoGrid').innerHTML = `
    <div class="modal-info-item">
      <div class="modal-info-label">${t.occupation}</div>
      <div class="modal-info-value">${p.occupation}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">${t.budget}</div>
      <div class="modal-info-value">${p.budget}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">${t.schedule}</div>
      <div class="modal-info-value">${p.schedule}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">${t.pets}</div>
      <div class="modal-info-value">${p.pets}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">${t.smoker}</div>
      <div class="modal-info-value">${p.smoker}</div>
    </div>
  `;
  document.getElementById('modalSkipText').textContent = t.skip;
  document.getElementById('modalLikeText').textContent = t.like;

  document.getElementById('profileModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('profileModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', closeModal);
document.getElementById('modalBtnSkip').addEventListener('click', () => { closeModal(); setTimeout(() => swipe('left'), 150); });
document.getElementById('modalBtnLike').addEventListener('click', () => { closeModal(); setTimeout(() => swipe('right'), 150); });

// ─── Botones swipe ─────────────────────────────────────────────
btnSkip.addEventListener('click', () => swipe('left'));
btnLike.addEventListener('click', () => swipe('right'));
btnProfile.addEventListener('click', () => { if (currentIndex < profiles.length) openModal(currentIndex); });

document.querySelector('.filters-btn').addEventListener('click', () => {
  document.getElementById('filtersModal').classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeFiltersModal() {
  document.getElementById('filtersModal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('filtersClose').addEventListener('click', closeFiltersModal);
document.getElementById('filtersBackdrop').addEventListener('click', closeFiltersModal);
document.getElementById('applyFiltersBtn').addEventListener('click', closeFiltersModal);

// Toggle pills en el modal de filtros
document.querySelectorAll('#filtersSheet span').forEach(pill => {
  pill.addEventListener('click', () => {
    const isActive = pill.style.background.includes('rgba(19, 193, 172');
    if (isActive) {
      pill.style.background = 'var(--gray-100)';
      pill.style.color = 'var(--gray-500)';
      pill.style.border = 'none';
    } else {
      pill.style.background = 'rgba(19,193,172,0.1)';
      pill.style.color = 'var(--secondary)';
      pill.style.border = '1px solid rgba(19,193,172,0.3)';
    }
  });
});

// ─── Init ──────────────────────────────────────────────────────
applyLang(currentLang);
renderCards();
</script>
<script src="../js/shared.js"></script>
</body>
</html>
